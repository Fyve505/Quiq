<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiq AI Assistant - Powered by Cohere</title>

  <!-- Font Awesome (One Line) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Main Styles -->
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="chat-app">
    <header>
      <h1><i class="fas fa-robot"></i> AI Assistant</h1>
    </header>

    <main id="chat-box" class="chat-box">
      <div class="message ai">
        Hello! Ask me anything — I can give detailed, formatted answers.
      </div>
    </main>

    <form id="chat-form" class="chat-form">
      <input
        type="text"
        id="user-input"
        placeholder="Ask something smart..."
        autocomplete="off"
        required
      />
      <button type="submit">
        <i class="fas fa-paper-plane"></i>
      </button>
    </form>
  </div>
  <script src="/script.js"></script>
</body>
</html>
