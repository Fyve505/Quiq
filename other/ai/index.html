<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Assistant - Powered by Cohere</title>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    /* Reset & base */
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color, #121212);
      color: var(--text-color, #eee);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .chat-app {
      display: flex;
      flex-direction: column;
      width: 700px;
      max-width: 95vw;
      height: 800px;
      background: var(--chat-bg-color, #1e1e1e);
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 100, 255, 0.6);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 30px;
      background: var(--header-bg-color, #1a1a1a);
      color: var(--accent-color, #0066ff);
      font-weight: 700;
      font-size: 1.7rem;
      user-select: none;
      gap: 20px;
      transition: background 0.3s, color 0.3s;
    }
    header .left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* Icons */
    .fa-robot,
    #settings-btn i {
      color: var(--accent-color, #0066ff);
    }

    /* API key input */
    #api-key-input {
      background: #121212;
      color: #eee;
      border: 1.5px solid #555;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 1rem;
      outline-offset: 2px;
      outline-color: var(--accent-color, #0066ff);
      width: 320px;
      transition: border-color 0.3s, background 0.3s;
    }
    #api-key-input::placeholder {
      color: #555;
    }
    #api-key-input:focus {
      border-color: var(--accent-color, #0066ff);
      outline: none;
      background: #181818;
    }

    /* Settings button */
    #settings-btn {
      background: none;
      border: none;
      color: var(--accent-color, #0066ff);
      cursor: pointer;
      font-size: 1.6rem;
      padding: 8px 12px;
      border-radius: 6px;
      transition: background-color 0.2s ease;
      flex-shrink: 0;
    }
    #settings-btn:hover {
      background-color: var(--accent-color-transparent, #0066ff33);
    }

    /* Chat box */
    #chat-box {
      flex: 1;
      padding: 25px 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: var(--chat-bg-color, #1e1e1e);
      scrollbar-width: thin;
      scrollbar-color: var(--accent-color, #0066ff) var(--chat-bg-color, #1e1e1e);
      transition: background 0.3s;
    }
    #chat-box::-webkit-scrollbar {
      width: 10px;
    }
    #chat-box::-webkit-scrollbar-thumb {
      background-color: var(--accent-color, #0066ff);
      border-radius: 6px;
    }

    /* Messages */
    .message {
      max-width: 75%;
      padding: 14px 22px;
      border-radius: 24px;
      word-break: break-word;
      white-space: pre-wrap;
      font-size: 1.1rem;
      line-height: 1.4;
      box-shadow: 0 0 10px #0005;
      transition: background 0.3s, color 0.3s;
    }
    .message.user {
      align-self: flex-end;
      background: var(--accent-color, #0066ff);
      color: #121212;
      border-bottom-right-radius: 6px;
      box-shadow: 0 0 20px var(--accent-color, #0066ff);
    }
    .message.ai {
      align-self: flex-start;
      background: #2a2a2a;
      color: #ccc;
      border-bottom-left-radius: 6px;
      white-space: pre-wrap;
    }

    /* Input form */
    form.chat-form {
      background: #222;
      padding: 16px 25px;
      display: flex;
      gap: 12px;
      transition: background 0.3s;
    }

    #user-input {
      flex: 1;
      padding: 14px 22px;
      border-radius: 30px;
      border: none;
      font-size: 1.1rem;
      font-family: inherit;
      outline-offset: 2px;
      outline-color: var(--accent-color, #0066ff);
      background: #121212;
      color: #eee;
      transition: background 0.3s;
    }
    #user-input::placeholder {
      color: #555;
    }

    button[type="submit"] {
      background: var(--accent-color, #0066ff);
      border: none;
      color: #121212;
      font-size: 1.6rem;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.25s ease;
      box-shadow: 0 0 15px var(--accent-color, #0066ff);
    }
    button[type="submit"]:hover {
      background: #004bb5;
      box-shadow: 0 0 25px #004bb5;
    }

    /* Modal overlay */
    #settings-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #settings-modal.active {
      display: flex;
    }

    /* Modal box */
    #settings-modal .modal-content {
      background: #272727;
      padding: 28px 32px;
      border-radius: 14px;
      width: 90%;
      max-width: 480px;
      color: #eee;
      box-shadow: 0 0 25px #0066ffaa;
    }

    #settings-modal h2 {
      margin-top: 0;
      margin-bottom: 20px;
      color: var(--accent-color, #0066ff);
      font-size: 1.8rem;
    }

    #settings-modal label {
      display: block;
      margin-top: 16px;
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    #settings-modal input[type="text"],
    #settings-modal textarea,
    #settings-modal select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1.8px solid #555;
      background: #121212;
      color: #eee;
      font-family: monospace;
      font-size: 1rem;
      resize: vertical;
      outline-offset: 2px;
      outline-color: var(--accent-color, #0066ff);
      transition: border-color 0.3s;
    }

    #settings-modal input[type="text"]:focus,
    #settings-modal textarea:focus,
    #settings-modal select:focus {
      border-color: var(--accent-color, #0066ff);
      outline: none;
      background: #181818;
    }

    #settings-modal textarea {
      height: 100px;
    }

    #settings-modal .buttons {
      margin-top: 28px;
      text-align: right;
    }

    #settings-modal button {
      padding: 12px 20px;
      font-size: 1.1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      user-select: none;
      margin-left: 14px;
      min-width: 100px;
    }

    #save-settings-btn {
      background: var(--accent-color, #0066ff);
      color: #121212;
      box-shadow: 0 0 25px var(--accent-color, #0066ff);
    }
    #save-settings-btn:hover {
      background: #004bb5;
      box-shadow: 0 0 35px #004bb5;
    }

    #close-settings-btn {
      background: #444;
      color: #eee;
      box-shadow: none;
    }
    #close-settings-btn:hover {
      background: #666;
    }

  </style>
</head>
<body>
  <div class="chat-app">
    <header>
      <div class="left">
        <i class="fas fa-robot"></i> AI Assistant
      </div>

      <input
        type="password"
        id="api-key-input"
        placeholder="Paste your Cohere API key"
        autocomplete="off"
        spellcheck="false"
      />

      <button id="settings-btn" title="Settings" aria-label="Settings">
        <i class="fas fa-gear"></i>
      </button>
    </header>

    <main id="chat-box" class="chat-box">
      <div class="message ai">
        Hello! Ask me anything — I can give detailed, formatted answers.
      </div>
    </main>

    <form id="chat-form" class="chat-form">
      <input
        type="text"
        id="user-input"
        placeholder="Ask something smart..."
        autocomplete="off"
        required
      />
      <button type="submit">
        <i class="fas fa-paper-plane"></i>
      </button>
    </form>
  </div>

  <!-- Settings Modal -->
  <div
    id="settings-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="settings-title"
  >
    <div class="modal-content">
      <h2 id="settings-title">Settings</h2>

      <label for="system-prompt-input">System Prompt</label>
      <textarea
        id="system-prompt-input"
        spellcheck="false"
        rows="4"
        maxlength="300"
        >You are a helpful assistant.</textarea
      >

      <label for="model-input">Model Name</label>
      <input
        type="text"
        id="model-input"
        spellcheck="false"
        value="command-xlarge-nightly"
        maxlength="50"
      />

      <label for="theme-select">Theme Color</label>
      <select id="theme-select" aria-label="Theme Color">
        <option value="blue">Blue (default)</option>
        <option value="dark">Dark</option>
      </select>

      <label for="chatbox-select">Chatbox Background</label>
      <select id="chatbox-select" aria-label="Chatbox Background">
        <option value="blue">Blue tinted</option>
        <option value="dark">Dark (default)</option>
      </select>

      <label for="cookies-toggle" style="margin-top:20px; font-weight: 600;">
        <input type="checkbox" id="cookies-toggle" />
        Enable cookie saving
      </label>

      <div class="buttons">
        <button id="save-settings-btn" type="button">Save</button>
        <button id="close-settings-btn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    // Cookie helpers
    function setCookie(name, value, days) {
      if (!document.cookieEnabled) return;
      const d = new Date();
      d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
      document.cookie = `${name}=${encodeURIComponent(
        value
      )};path=/;expires=${d.toUTCString()};SameSite=Lax`;
    }

    function getCookie(name) {
      if (!document.cookieEnabled) return null;
      const cookies = document.cookie.split("; ");
      for (const cookie of cookies) {
        const [key, val] = cookie.split("=");
        if (key === name) return decodeURIComponent(val);
      }
      return null;
    }

    // Markdown & message formatting
    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function parseMarkdown(text) {
      const lines = text.split("\n");
      const parsed = [];
      let ulOpen = false;
      let inCodeBlock = false;

      lines.forEach((line) => {
        const trimmed = line.trim();

        if (trimmed.startsWith("```")) {
          if (!inCodeBlock) {
            parsed.push("<pre><code>");
            inCodeBlock = true;
          } else {
            parsed.push("</code></pre>");
            inCodeBlock = false;
          }
          return;
        }

        if (inCodeBlock) {
          parsed.push(escapeHTML(line));
          return;
        }

        if (trimmed.startsWith("---")) {
          if (ulOpen) {
            parsed.push("</ul>");
            ulOpen = false;
          }
          parsed.push("<hr>");
          return;
        }

        if (trimmed.startsWith("#### ")) {
          if (ulOpen) {
            parsed.push("</ul>");
            ulOpen = false;
          }
          parsed.push(`<h4>${escapeHTML(trimmed.slice(5))}</h4>`);
          return;
        }

        if (trimmed.startsWith("### ")) {
          if (ulOpen) {
            parsed.push("</ul>");
            ulOpen = false;
          }
          parsed.push(`<h3>${escapeHTML(trimmed.slice(4))}</h3>`);
          return;
        }

        if (trimmed.startsWith("- ")) {
          if (!ulOpen) {
            parsed.push("<ul>");
            ulOpen = true;
          }
          let item = escapeHTML(trimmed.slice(2)).replace(
            /\*\*(.+?)\*\*/g,
            "<strong>$1</strong>"
          );
          parsed.push(`<li>${item}</li>`);
          return;
        }

        if (ulOpen) {
          parsed.push("</ul>");
          ulOpen = false;
        }

        parsed.push(
          escapeHTML(trimmed).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        );
      });

      if (ulOpen) parsed.push("</ul>");
      if (inCodeBlock) parsed.push("</code></pre>");

      return parsed.join("\n");
    }

    function formatDiv(div) {
      if (!div.classList.contains("ai")) return;
      const parsedHTML = parseMarkdown(div.textContent);
      div.innerHTML = parsedHTML;
    }

    function appendMessage(sender, text) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      msg.textContent = text;
      document.getElementById("chat-box").appendChild(msg);
      msg.scrollIntoView({ behavior: "smooth" });
      if (sender === "ai") formatDiv(msg);
    }

    // Settings modal logic
    const settingsBtn = document.getElementById("settings-btn");
    const settingsModal = document.getElementById("settings-modal");
    const closeSettingsBtn = document.getElementById("close-settings-btn");
    const saveSettingsBtn = document.getElementById("save-settings-btn");

    const systemPromptInput = document.getElementById("system-prompt-input");
    const modelInput = document.getElementById("model-input");
    const themeSelect = document.getElementById("theme-select");
    const chatboxSelect = document.getElementById("chatbox-select");
    const cookiesToggle = document.getElementById("cookies-toggle");

    // Default settings
    let systemPrompt = "You are a helpful assistant.";
    let modelName = "command-xlarge-nightly";
    let themeColor = "blue";
    let chatboxBg = "dark";
    let cookiesEnabled = false;

    // Load saved settings from cookies
    function loadSettings() {
      const savedCookiesEnabled = getCookie("cookiesEnabled");
      cookiesEnabled = savedCookiesEnabled === "true";

      if (cookiesEnabled) {
        const savedPrompt = getCookie("systemPrompt");
        if (savedPrompt) systemPrompt = savedPrompt;

        const savedModel = getCookie("modelName");
        if (savedModel) modelName = savedModel;

        const savedTheme = getCookie("themeColor");
        if (savedTheme) themeColor = savedTheme;

        const savedChatbox = getCookie("chatboxBg");
        if (savedChatbox) chatboxBg = savedChatbox;
      }

      // Update UI
      systemPromptInput.value = systemPrompt;
      modelInput.value = modelName;
      themeSelect.value = themeColor;
      chatboxSelect.value = chatboxBg;
      cookiesToggle.checked = cookiesEnabled;

      applyTheme();
    }

    // Save settings if cookies enabled
    function saveSettingsToCookies() {
      if (!cookiesEnabled) {
        // Clear cookies
        setCookie("systemPrompt", "", -1);
        setCookie("modelName", "", -1);
        setCookie("themeColor", "", -1);
        setCookie("chatboxBg", "", -1);
        setCookie("cookiesEnabled", "false", 7);
        return;
      }
      set
    function saveSettingsToCookies() {
      if (!cookiesEnabled) {
        // Clear cookies
        setCookie("systemPrompt", "", -1);
        setCookie("modelName", "", -1);
        setCookie("themeColor", "", -1);
        setCookie("chatboxBg", "", -1);
        setCookie("cookiesEnabled", "false", 7);
        return;
      }
      setCookie("systemPrompt", systemPrompt, 7);
      setCookie("modelName", modelName, 7);
      setCookie("themeColor", themeColor, 7);
      setCookie("chatboxBg", chatboxBg, 7);
      setCookie("cookiesEnabled", "true", 7);
    }

    // Apply theme and colors
    function applyTheme() {
      let root = document.documentElement;
      if (themeColor === "blue") {
        root.style.setProperty("--accent-color", "#0066ff");
        root.style.setProperty("--accent-color-transparent", "#0066ff33");
      } else if (themeColor === "dark") {
        root.style.setProperty("--accent-color", "#999");
        root.style.setProperty("--accent-color-transparent", "#99999933");
      }

      if (chatboxBg === "blue") {
        root.style.setProperty("--chat-bg-color", "#142850");
        root.style.setProperty("--bg-color", "#0c1632");
        root.style.setProperty("--header-bg-color", "#0b1a3b");
        root.style.setProperty("--text-color", "#dde5f0");
      } else if (chatboxBg === "dark") {
        root.style.setProperty("--chat-bg-color", "#1e1e1e");
        root.style.setProperty("--bg-color", "#121212");
        root.style.setProperty("--header-bg-color", "#1a1a1a");
        root.style.setProperty("--text-color", "#eee");
      }
    }

    // Open settings modal
    settingsBtn.addEventListener("click", () => {
      settingsModal.classList.add("active");
    });

    // Close settings modal
    closeSettingsBtn.addEventListener("click", () => {
      settingsModal.classList.remove("active");
    });

    // Save settings handler
    saveSettingsBtn.addEventListener("click", () => {
      systemPrompt = systemPromptInput.value.trim() || "You are a helpful assistant.";
      modelName = modelInput.value.trim() || "command-xlarge-nightly";
      themeColor = themeSelect.value;
      chatboxBg = chatboxSelect.value;
      cookiesEnabled = cookiesToggle.checked;

      applyTheme();
      saveSettingsToCookies();
      settingsModal.classList.remove("active");
    });

    // On page load, restore saved settings
    window.addEventListener("load", () => {
      loadSettings();
    });

    // Chat logic and API call
    document.getElementById("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const userInput = document.getElementById("user-input");
      const chatBox = document.getElementById("chat-box");
      const apiKeyInput = document.getElementById("api-key-input");

      const userMessage = userInput.value.trim();
      const apiKey = apiKeyInput.value.trim();

      if (!userMessage) return;

      if (!apiKey) {
        alert("Please enter your Cohere API key!");
        return;
      }

      appendMessage("user", userMessage);
      userInput.value = "";

      appendMessage("ai", "Typing...");

      try {
        const aiResponse = await callCohereChatAPI(userMessage, apiKey);

        const aiMessages = document.querySelectorAll(".message.ai");
        aiMessages[aiMessages.length - 1].textContent = aiResponse;
        formatDiv(aiMessages[aiMessages.length - 1]);
      } catch (error) {
        console.error("API call error:", error);
        const aiMessages = document.querySelectorAll(".message.ai");
        aiMessages[aiMessages.length - 1].textContent = `Error: ${error.message}`;
      }
    });

    async function callCohereChatAPI(userMessage, apiKey) {
      if (!userMessage) throw new Error("Empty user message");

      const prompt = `${systemPrompt}\nUser: ${userMessage}\nAssistant:`;

      const res = await fetch("https://api.cohere.ai/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: modelName,
          message: prompt,
        }),
      });

      if (!res.ok) {
        let errMsg = "Cohere Chat API error";
        try {
          const errData = await res.json();
          if (errData.message) errMsg = errData.message;
        } catch {}
        throw new Error(errMsg);
      }

      const data = await res.json();
      return data.text?.trim() || "No response from Cohere.";
    }
  </script>
</body>
</html>
