<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Assistant - Powered by Cohere</title>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #121212;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-app {
      display: flex;
      flex-direction: column;
      width: 400px;
      max-width: 100%;
      height: 600px;
      background: #1e1e1e;
      border-radius: 8px;
      box-shadow: 0 0 15px #000;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: #272727;
      color: #00ffa2;
      font-weight: 700;
      font-size: 1.3rem;
      user-select: none;
      gap: 12px;
    }
    header .left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #api-key-input {
      background: #121212;
      color: #eee;
      border: 1.5px solid #555;
      border-radius: 5px;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 0.9rem;
      outline-offset: 2px;
      outline-color: #00ffa2;
      width: 250px;
    }
    #api-key-input::placeholder {
      color: #555;
    }
    #api-key-input:focus {
      border-color: #00ffa2;
      outline: none;
      background: #181818;
    }

    /* Settings button */
    #settings-btn {
      background: none;
      border: none;
      color: #00ffa2;
      cursor: pointer;
      font-size: 1.4rem;
      padding: 6px 10px;
      border-radius: 5px;
      transition: background-color 0.2s ease;
    }
    #settings-btn:hover {
      background-color: #00ffa233;
    }

    #chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #121212;
      scrollbar-width: thin;
      scrollbar-color: #00ffa2 #1e1e1e;
    }
    #chat-box::-webkit-scrollbar {
      width: 8px;
    }
    #chat-box::-webkit-scrollbar-thumb {
      background-color: #00ffa2;
      border-radius: 4px;
    }

    .message {
      max-width: 80%;
      padding: 10px 15px;
      border-radius: 20px;
      word-break: break-word;
      white-space: pre-wrap;
      font-size: 0.95rem;
      line-height: 1.3;
    }
    .message.user {
      align-self: flex-end;
      background: #00ffa2;
      color: #121212;
      border-bottom-right-radius: 4px;
    }
    .message.ai {
      align-self: flex-start;
      background: #272727;
      color: #ccc;
      border-bottom-left-radius: 4px;
      white-space: pre-wrap;
    }

    form.chat-form {
      background: #222;
      padding: 12px 15px;
      display: flex;
      gap: 8px;
    }

    #user-input {
      flex: 1;
      padding: 10px 15px;
      border-radius: 25px;
      border: none;
      font-size: 1rem;
      font-family: inherit;
      outline-offset: 2px;
      outline-color: #00ffa2;
      background: #121212;
      color: #eee;
    }
    #user-input::placeholder {
      color: #555;
    }

    button[type="submit"] {
      background: #00ffa2;
      border: none;
      color: #121212;
      font-size: 1.3rem;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
    }
    button[type="submit"]:hover {
      background: #00cc7a;
    }

    /* Modal overlay */
    #settings-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #settings-modal.active {
      display: flex;
    }

    /* Modal box */
    #settings-modal .modal-content {
      background: #272727;
      padding: 20px 25px;
      border-radius: 10px;
      width: 90%;
      max-width: 360px;
      color: #eee;
      box-shadow: 0 0 15px #00ffa2aa;
    }

    #settings-modal h2 {
      margin-top: 0;
      margin-bottom: 15px;
      color: #00ffa2;
    }

    #settings-modal label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    #settings-modal input[type="text"],
    #settings-modal textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1.5px solid #555;
      background: #121212;
      color: #eee;
      font-family: monospace;
      font-size: 0.9rem;
      resize: vertical;
      outline-offset: 2px;
      outline-color: #00ffa2;
    }

    #settings-modal textarea {
      height: 80px;
    }

    #settings-modal button {
      margin-top: 20px;
      padding: 10px 16px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background-color 0.25s ease;
    }

    #save-settings-btn {
      background: #00ffa2;
      color: #121212;
      margin-right: 10px;
    }

    #save-settings-btn:hover {
      background: #00cc7a;
    }

    #close-settings-btn {
      background: #444;
      color: #eee;
    }

    #close-settings-btn:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <div class="chat-app">
    <header>
      <div class="left">
        <i class="fas fa-robot"></i> AI Assistant
      </div>

      <input
        type="password"
        id="api-key-input"
        placeholder="Paste your Cohere API key"
        autocomplete="off"
        spellcheck="false"
      />

      <button id="settings-btn" title="Settings" aria-label="Settings">
        <i class="fas fa-gear"></i>
      </button>
    </header>

    <main id="chat-box" class="chat-box">
      <div class="message ai">
        Hello! Ask me anything — I can give detailed, formatted answers.
      </div>
    </main>

    <form id="chat-form" class="chat-form">
      <input
        type="text"
        id="user-input"
        placeholder="Ask something smart..."
        autocomplete="off"
        required
      />
      <button type="submit">
        <i class="fas fa-paper-plane"></i>
      </button>
    </form>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-content">
      <h2 id="settings-title">Settings</h2>
      <label for="system-prompt-input">System Prompt</label>
      <textarea id="system-prompt-input" spellcheck="false" rows="3">You are a helpful assistant.</textarea>

      <label for="model-input">Model Name</label>
      <input type="text" id="model-input" spellcheck="false" value="command-xlarge-nightly" />

      <div style="margin-top: 20px; text-align: right;">
        <button id="save-settings-btn" type="button">Save</button>
        <button id="close-settings-btn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    // Markdown & message formatting functions (same as before)
    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function parseMarkdown(text) {
      const lines = text.split("\n");
      const parsed = [];
      let ulOpen = false;
      let inCodeBlock = false;

      lines.forEach((line) => {
        const trimmed = line.trim();

        if (trimmed.startsWith("```")) {
          if (!inCodeBlock) {
            parsed.push("<pre><code>");
            inCodeBlock = true;
          } else {
            parsed.push("</code></pre>");
            inCodeBlock = false;
          }
          return;
        }

        if (inCodeBlock) {
          parsed.push(escapeHTML(line));
          return;
        }

        if (trimmed.startsWith("---")) {
          if (ulOpen) {
            parsed.push("</ul>");
            ulOpen = false;
          }
          parsed.push("<hr>");
          return;
        }

        if (trimmed.startsWith("#### ")) {
          if (ulOpen) {
            parsed.push("</ul>");
            ulOpen = false;
          }
          parsed.push(`<h4>${escapeHTML(trimmed.slice(5))}</h4>`);
          return;
        }

        if (trimmed.startsWith("### ")) {
          if (ulOpen) {
            parsed.push("</ul>");
            ulOpen = false;
          }
          parsed.push(`<h3>${escapeHTML(trimmed.slice(4))}</h3>`);
          return;
        }

        if (trimmed.startsWith("- ")) {
          if (!ulOpen) {
            parsed.push("<ul>");
            ulOpen = true;
          }
          let item = escapeHTML(trimmed.slice(2)).replace(
            /\*\*(.+?)\*\*/g,
            "<strong>$1</strong>"
          );
          parsed.push(`<li>${item}</li>`);
          return;
        }

        if (ulOpen) {
          parsed.push("</ul>");
          ulOpen = false;
        }

        parsed.push(
          escapeHTML(trimmed).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        );
      });

      if (ulOpen) parsed.push("</ul>");
      if (inCodeBlock) parsed.push("</code></pre>");

      return parsed.join("\n");
    }

    function formatDiv(div) {
      if (!div.classList.contains("ai")) return;
      const parsedHTML = parseMarkdown(div.textContent);
      div.innerHTML = parsedHTML;
    }

    function appendMessage(sender, text) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      msg.textContent = text;
      document.getElementById("chat-box").appendChild(msg);
      msg.scrollIntoView({ behavior: "smooth" });
      if (sender === "ai") formatDiv(msg);
    }

    // Settings modal logic
    const settingsBtn = document.getElementById("settings-btn");
    const settingsModal = document.getElementById("settings-modal");
    const closeSettingsBtn = document.getElementById("close-settings-btn");
    const saveSettingsBtn = document.getElementById("save-settings-btn");

    const systemPromptInput = document.getElementById("system-prompt-input");
    const modelInput = document.getElementById("model-input");

    // Defaults
    let systemPrompt = "You are a helpful assistant.";
    let modelName = "command-xlarge-nightly";

    settingsBtn.addEventListener("click", () => {
      // Load current settings into inputs
      systemPromptInput.value = systemPrompt;
      modelInput.value = modelName;

      settingsModal.classList.add("active");
    });

    closeSettingsBtn.addEventListener("click", () => {
      settingsModal.classList.remove("active");
    });

    saveSettingsBtn.addEventListener("click", () => {
      systemPrompt = systemPromptInput.value.trim() || "You are a helpful assistant.";
      modelName = modelInput.value.trim() || "command-xlarge-nightly";

      settingsModal.classList.remove("active");
    });

    // Chat form submit & API call
    document.getElementById("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const userInput = document.getElementById("user-input");
      const userMessage = userInput.value.trim();

      if (!userMessage) {
        console.warn("Empty input — ignoring.");
        return;
      }

      appendMessage("user", userMessage);
      userInput.value = "";

      appendMessage("ai", "Typing...");

      try {
        const apiKeyInput = document.getElementById("api-key-input");
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey)
          throw new Error(
            "API key is missing. Paste your Cohere API key on top."
          );

        // Build prompt with current systemPrompt
        const prompt = `${systemPrompt}\nUser: ${userMessage}\nAssistant:`;

        const response = await fetch("https://api.cohere.ai/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model: modelName,
            message: prompt,
          }),
        });

        if (!response.ok) {
          let errorMessage = "Cohere Chat API error";
          try {
            const errData = await response.json();
            if (errData.message) errorMessage = errData.message;
          } catch {}
          throw new Error(errorMessage);
        }

        const data = await response.json();
        const aiMessages = document.querySelectorAll(".message.ai");
        aiMessages[aiMessages.length - 1].textContent = data.text?.trim() || "No response from Cohere.";
        formatDiv(aiMessages[aiMessages.length - 1]);
      } catch (error) {
        console.error("API call error:", error);
        const aiMessages = document.querySelectorAll(".message.ai");
        aiMessages[aiMessages.length - 1].textContent = `Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>
