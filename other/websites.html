<!DOCTYPE html>
<html>
<head>
  <title>Not Ready</title>
  <style>
    body {
      background-color: #f9f9f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 3em;
      color: #333;
    }

    .pro-button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .pro-button:hover {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Not Ready</h1>
  <button class="pro-button" onclick="window.close()">Close Window</button>
</body>
</html>
