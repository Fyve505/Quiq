<!DOCTYPE html>
<html>
<head>
  <title>Not-Allowed</title>
  <link rel="icon" href="../../favicon.png" type="image/png">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #f9f9f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 100px;
      font-size: 3em;
      color: #333;
    }

    .pro-button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4a90e2, #357ABD);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      text-decoration: none;
      display: inline-block;
    }

    .pro-button:hover {
      background: linear-gradient(135deg, #357ABD, #4a90e2);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      transform: scale(1.05);
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      border: none;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <h1>Access-Denied!</h1>
  <a href="https://quiq.vercel.app/" class="pro-button">Go Back</a>

  <script>
    async function hashCode(input) {
      const encoder = new TextEncoder();
      const data = encoder.encode(input);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function unlock(code) {
      const hashed = await hashCode(code);
      const correctHash = "e7cf3ef4f17c3999a94f2c6f612e8a888e5b1026878e4e19398b23bd38ec221a"; // SHA-256 of "opensesame"
      if (hashed === correctHash) {
        document.body.innerHTML = ''; // Clear page
        const iframe = document.createElement('iframe');
        iframe.src = '../admin/index.html';
        document.body.appendChild(iframe);
      } else {
        console.warn("❌ Incorrect code.");
      }
    }

    console.log("%c To GEt admin access, run: unlock('Password')", "color: green; font-size: 16px");
  </script>
</body>
</html>
