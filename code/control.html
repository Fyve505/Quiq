<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel - Multi Target</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 2rem;
      background-color: #1e1e2f;
      color: #f4f4f4;
    }
    h1 {
      text-align: center;
      color: #00ffff;
    }
    .container {
      max-width: 900px;
      margin: 2rem auto;
      background: #2b2b3c;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
    }
    label, input, textarea, button {
      display: block;
      width: 100%;
      margin-top: 1rem;
      font-size: 1rem;
    }
    input {
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid #444;
      background-color: #1a1a26;
      color: #00ffcc;
    }
    textarea {
      height: 300px;
      padding: 1rem;
      font-family: monospace;
      background-color: #1a1a26;
      color: #00ffcc;
      border: 1px solid #444;
      border-radius: 8px;
      resize: vertical;
    }
    button {
      margin-top: 1.5rem;
      padding: 1rem;
      background-color: #00bcd4;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background-color: #0097a7;
    }
    iframe {
      display: none;
    }
  </style>
</head>
<body>
  <h1>🌐 Admin Control Panel (Multi Target)</h1>

  <div class="container">
    <label for="targetUrl">Target Page URL (must include protocol, e.g. https://):</label>
    <input type="url" id="targetUrl" placeholder="https://example.com" />

    <label for="htmlContent"><strong>Enter Full HTML to send:</strong></label>
    <textarea id="htmlContent">
<!DOCTYPE html>
<html>
<head><title>Remote HTML</title></head>
<body>
  <h1>Controlled by Admin 🎮</h1>
  <p>This page is live-updated from your admin panel.</p>
</body>
</html>
    </textarea>

    <button onclick="sendHTML()">🚀 Send HTML to Target</button>
  </div>

  <!-- Hidden iframe to load and send messages -->
  <iframe id="targetPage"></iframe>

  <script>
    function sendHTML() {
      const url = document.getElementById("targetUrl").value.trim();
      if (!url) {
        alert("Please enter a valid target URL");
        return;
      }
      const html = document.getElementById("htmlContent").value;

      const iframe = document.getElementById("targetPage");
      iframe.src = url;

      iframe.onload = () => {
        try {
          iframe.contentWindow.postMessage({ html }, new URL(url).origin);
          console.log("Sent HTML to:", url);
        } catch (e) {
          console.error("Failed to send message:", e);
        }
      };
    }
  </script>
</body>
</html>
