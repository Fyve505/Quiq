<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Protected</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background-color: #1e1e1e;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
      width: 320px;
      text-align: center;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-top: 1rem;
      margin-bottom: 1.2rem;
      border-radius: 8px;
      border: none;
      background-color: #2c2c2c;
      color: #eee;
      font-size: 1rem;
    }
    button {
      background-color: #007bff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
    }
    button:hover {
      background-color: #0056b3;
    }
    #message {
      margin-top: 1rem;
      color: #ff5555;
      font-weight: 600;
      min-height: 1.2em;
    }
    h1 {
      color: #00ffcc;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box" id="passwordBox">
    <h2>Enter Password</h2>
    <input type="password" id="password" placeholder="••••••••" />
    <button onclick="checkPassword()">Submit</button>
    <div id="message"></div>
  </div>

  <script>
    const correctHash = "7f6b8d6f08d352f74877ed08a01903956f367be6339037d52a40db72ac1f4da8"; // sha256("password")

    async function hash(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkPassword() {
      const input = document.getElementById('password').value;
      const message = document.getElementById('message');
      const hashedInput = await hash(input);

      if (hashedInput === correctHash) {
        // Remove password box and show message
        const box = document.getElementById('passwordBox');
        box.remove();

        const h1 = document.createElement('h1');
        h1.textContent = 'Not Ready Yet';
        document.body.appendChild(h1);
      } else {
        message.textContent = 'Incorrect password.';
      }
    }
  </script>
</body>
</html>
