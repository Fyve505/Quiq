<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Page Editor</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: sans-serif;
    }
    textarea {
      width: 40%;
      padding: 10px;
      border: none;
      resize: none;
      outline: none;
      background: #111;
      color: #0f0;
      font-family: monospace;
    }
    iframe {
      flex: 1;
      border: none;
    }
  </style>
</head>
<body>
  <textarea placeholder="Type HTML here..."><h1>Hello from admin!</h1></textarea>
  <iframe id="targetFrame" src="realpage.html"></iframe>

  <script>
    const textarea = document.querySelector("textarea");
    const iframe = document.getElementById("targetFrame");

    textarea.addEventListener("input", () => {
      iframe.contentWindow.postMessage({
        type: "UPDATE_HTML",
        html: textarea.value
      }, "*");
    });
  </script>
</body>
</html>
