<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #container {
      background-color: #1e1e1e;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 1rem 0 1.5rem 0;
      border-radius: 8px;
      border: none;
      background-color: #2c2c2c;
      color: #eee;
      font-size: 1rem;
    }
    button {
      background-color: #007bff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
    }
    button:hover {
      background-color: #0056b3;
    }
    #message {
      margin-top: 1rem;
      color: #ff5555;
      font-weight: 600;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- Password screen content goes here -->
  </div>

  <script>

    // SHA-256 hash of the correct password:
    const correctHash = "7f6b8d6f08d352f74877ed08a01903956f367be6339037d52a40db72ac1f4da8";
           //-----------------------------------------------------------\\
          //------------------------------Edit---------------------------\\
        //----------------------------------------------------------------\\
    const successContent = `
      <h1 style="color:#00ffcc; font-weight:700; margin:0;">
        Not Ready Yet
      </h1>
      <p style="margin-top:1rem; color:#aaa;">
        You can put any HTML here, including images, links, whatever.
      </p>
    `;

    const passwordScreenContent = `
      <h2>Enter Password</h2>
      <input type="password" id="password" placeholder="••••••••" autofocus />
      <button id="submitBtn">Submit</button>
      <div id="message"></div>
    `;


    const container = document.getElementById("container");
    container.innerHTML = passwordScreenContent;

    // Hash function for SHA-256
    async function hash(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Check password on button click
    container.querySelector("#submitBtn").addEventListener("click", async () => {
      const input = container.querySelector("#password").value;
      const message = container.querySelector("#message");
      message.textContent = "";
      const hashedInput = await hash(input);

      if (hashedInput === correctHash) {
        container.innerHTML = successContent;
      } else {
        message.textContent = "Incorrect password.";
      }
    });

    // Optional: allow pressing Enter key to submit
    container.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        container.querySelector("#submitBtn").click();
      }
    });
  </script>
</body>
</html>
