<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .choice:hover {
      transform: scale(1.05);
      transition: transform 0.2s ease-in-out;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-700 min-h-screen flex items-center justify-center p-4 text-white">

  <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 max-w-md w-full text-center space-y-6">
    <h1 class="text-3xl font-bold mb-4">Rock Paper Scissors</h1>
    
    <div id="choices" class="flex justify-around">
      <button class="choice p-4 rounded-xl bg-gray-700 hover:bg-gray-600" onclick="play('rock')">
        🪨<br><span class="text-sm">Rock</span>
      </button>
      <button class="choice p-4 rounded-xl bg-gray-700 hover:bg-gray-600" onclick="play('paper')">
        📄<br><span class="text-sm">Paper</span>
      </button>
      <button class="choice p-4 rounded-xl bg-gray-700 hover:bg-gray-600" onclick="play('scissors')">
        ✂️<br><span class="text-sm">Scissors</span>
      </button>
    </div>

    <div class="text-lg mt-6">
      <p id="player-choice">You chose: —</p>
      <p id="ai-choice">AI chose: —</p>
      <p class="font-bold mt-2 text-xl" id="result">Result: —</p>
    </div>

    <button onclick="resetGame()" class="mt-4 bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-white">
      Play Again
    </button>
  </div>

  <script>
    const options = ["rock", "paper", "scissors"];

    const emojis = {
      rock: "🪨",
      paper: "📄",
      scissors: "✂️"
    };

    function play(player) {
      const ai = options[Math.floor(Math.random() * options.length)];
      document.getElementById("player-choice").innerHTML = `You chose: ${emojis[player]} (${player})`;
      document.getElementById("ai-choice").innerHTML = `AI chose: ${emojis[ai]} (${ai})`;

      let result = "";
      if (player === ai) {
        result = "It's a draw!";
      } else if (
        (player === "rock" && ai === "scissors") ||
        (player === "paper" && ai === "rock") ||
        (player === "scissors" && ai === "paper")
      ) {
        result = "You Win! 🎉";
      } else {
        result = "You Lose! 😢";
      }

      document.getElementById("result").innerText = `Result: ${result}`;
    }

    function resetGame() {
      document.getElementById("player-choice").innerText = "You chose: —";
      document.getElementById("ai-choice").innerText = "AI chose: —";
      document.getElementById("result").innerText = "Result: —";
    }
  </script>
</body>
</html>
