<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XO Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      text-align: center;
      padding-top: 40px;
    }
    h1 {
      margin-bottom: 10px;
    }
    #options {
      margin-bottom: 20px;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 5px;
      margin: 0 auto;
      width: max-content;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 2.5em;
      background-color: white;
      border: 2px solid #444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #status {
      margin-top: 20px;
      font-weight: bold;
    }
    button {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>XO Game</h1>

<div id="options">
  <label>Play With: </label>
  <select id="mode">
    <option value="real">Local Real Player</option>
    <option value="bot">Bot</option>
  </select>
</div>

<div id="board"></div>

<div id="status"></div>
<button onclick="resetGame()">Restart</button>

<script>
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const modeEl = document.getElementById('mode');
  let board = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameOver = false;

  function drawBoard() {
    boardEl.innerHTML = '';
    board.forEach((cell, index) => {
      const cellEl = document.createElement('div');
      cellEl.className = 'cell';
      cellEl.textContent = cell || '';
      cellEl.addEventListener('click', () => handleClick(index));
      boardEl.appendChild(cellEl);
    });
  }

  function handleClick(index) {
    if (board[index] || gameOver) return;
    board[index] = currentPlayer;
    drawBoard();
    if (checkWinner(currentPlayer)) {
      statusEl.textContent = `${currentPlayer} Wins!`;
      gameOver = true;
    } else if (board.every(cell => cell)) {
      statusEl.textContent = `It's a Draw!`;
      gameOver = true;
    } else {
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      if (modeEl.value === 'bot' && currentPlayer === 'O') {
        setTimeout(botMove, 500); // small delay
      }
    }
  }

  function botMove() {
    let emptyCells = board.map((v, i) => v ? null : i).filter(v => v !== null);
    if (emptyCells.length === 0) return;
    let move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    handleClick(move);
  }

  function checkWinner(player) {
    const winCombos = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];
    return winCombos.some(combo =>
      combo.every(index => board[index] === player)
    );
  }

  function resetGame() {
    board = Array(9).fill(null);
    currentPlayer = 'X';
    gameOver = false;
    statusEl.textContent = '';
    drawBoard();
  }

  drawBoard();
</script>

</body>
</html>
