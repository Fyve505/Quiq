<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XO Game Advanced</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding-top: 30px;
      background: #f8f8f8;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      margin: 20px auto;
      width: max-content;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 2.5em;
      border: 2px solid #444;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    select, button {
      margin: 5px;
      padding: 5px;
    }
    #status {
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>XO Game</h1>

<div>
  <label>Play With:</label>
  <select id="mode">
    <option value="real">Local Real Player</option>
    <option value="bot">Bot</option>
  </select>
</div>

<div id="botOptions" style="display: none;">
  <label>Bot Mode:</label>
  <select id="botMode">
    <option value="easy">Easy</option>
    <option value="normal">Normal</option>
    <option value="hard">Hard</option>
  </select>

  <label>Bot Type:</label>
  <select id="botType">
    <option value="normal">Normal</option>
    <option value="super">Super</option>
    <option value="max">Max</option>
  </select>
</div>

<div id="board"></div>
<div id="status"></div>
<button onclick="resetGame()">Restart</button>

<script>
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const modeEl = document.getElementById('mode');
  const botOptionsEl = document.getElementById('botOptions');
  const botModeEl = document.getElementById('botMode');
  const botTypeEl = document.getElementById('botType');

  let board = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameOver = false;

  const winCombos = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  modeEl.addEventListener('change', () => {
    botOptionsEl.style.display = modeEl.value === 'bot' ? 'block' : 'none';
    resetGame();
  });

  function drawBoard() {
    boardEl.innerHTML = '';
    board.forEach((cell, index) => {
      const cellEl = document.createElement('div');
      cellEl.className = 'cell';
      cellEl.textContent = cell || '';
      cellEl.addEventListener('click', () => handleClick(index));
      boardEl.appendChild(cellEl);
    });
  }

  function handleClick(index) {
    if (board[index] || gameOver) return;

    board[index] = currentPlayer;
    drawBoard();

    if (checkWinner(currentPlayer)) {
      statusEl.textContent = `${currentPlayer} Wins!`;
      gameOver = true;
    } else if (board.every(cell => cell)) {
      statusEl.textContent = "It's a Draw!";
      gameOver = true;
    } else {
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      if (modeEl.value === 'bot' && currentPlayer === 'O') {
        setTimeout(botMove, 400);
      }
    }
  }

  function botMove() {
    const mode = botModeEl.value;
    const type = botTypeEl.value;

    let move;
    if (type === 'max' && mode === 'hard') {
      move = bestMove('O');
    } else if (type === 'super') {
      move = smartBotMove(mode);
    } else if (type === 'max' && mode === 'normal') {
      move = blockOrWin() || randomMove();
    } else {
      move = (mode === 'hard') ? blockOrWin() || randomMove() : randomMove();
    }

    if (move !== null) handleClick(move);
  }

  function randomMove() {
    let empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
    return empty.length ? empty[Math.floor(Math.random() * empty.length)] : null;
  }

  function blockOrWin() {
    for (let combo of winCombos) {
      let [a, b, c] = combo;
      let line = [board[a], board[b], board[c]];
      if (line.filter(x => x === 'O').length === 2 && line.includes(null)) return combo[line.indexOf(null)];
      if (line.filter(x => x === 'X').length === 2 && line.includes(null)) return combo[line.indexOf(null)];
    }
    return null;
  }

  function smartBotMove(mode) {
    if (mode === 'easy') return randomMove();
    if (mode === 'normal') {
      if (board[4] === null) return 4; // center
      for (let i of [0, 2, 6, 8]) if (board[i] === null) return i; // corners
      return randomMove();
    }
    return blockOrWin() || randomMove();
  }

  function bestMove(player) {
    let opponent = player === 'O' ? 'X' : 'O';
    let best = -Infinity, move = null;

    board.forEach((_, i) => {
      if (board[i] === null) {
        board[i] = player;
        let score = minimax(board, 0, false, player, opponent);
        board[i] = null;
        if (score > best) {
          best = score;
          move = i;
        }
      }
    });

    return move;
  }

  function minimax(newBoard, depth, isMax, player, opponent) {
    let scores = { [player]: 10, [opponent]: -10, draw: 0 };

    let winner = getWinner(newBoard);
    if (winner !== null) return scores[winner];

    let moves = [];
    newBoard.forEach((_, i) => {
      if (newBoard[i] === null) {
        newBoard[i] = isMax ? player : opponent;
        let score = minimax(newBoard, depth + 1, !isMax, player, opponent);
        newBoard[i] = null;
        moves.push(score);
      }
    });

    return isMax ? Math.max(...moves) : Math.min(...moves)
