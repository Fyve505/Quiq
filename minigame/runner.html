<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Runner - Quiq</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; background:#1e1e1e; color:#eee; font-family:'Segoe UI'; overflow:hidden }
    canvas { background:linear-gradient(to top,#1c1c1c,#2a2a2a); display:block; width:100vw;height:100vh }
    #ui,#settings,#shopBox{position:absolute;z-index:10;padding:15px;border-radius:10px;background:rgba(0,0,0,0.5);backdrop-filter:blur(5px)}
    #ui{top:20px;left:20px}
    #settings{top:20px;right:20px;width:320px;max-height:85vh;overflow:auto;display:none}
    #shopBox{top:100px;left:50%;transform:translateX(-50%);width:250px;display:none}
    .btn,select,label,input[type=color],input[type=number],input[type=text]{margin:8px 0;width:100%}
    .btn{padding:8px;border:none;border-radius:6px;background:#333;color:#eee;cursor:pointer}
    input[type=color]{padding:0;height:28px}
    #overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);flex-direction:column;z-index:9}
    #overlay .btn{max-width:200px}
  </style>
</head>
<body>
<canvas id="gameCanvas" tabindex="0"></canvas>
<div id="ui">
  <button class="btn" onclick="togglePause()">⏯ Pause</button>
  <button class="btn" onclick="restartGame()">🔁 Restart</button>
  <button class="btn" onclick="toggleSettings()">⚙️ Settings</button>
  <button class="btn" onclick="toggleShop()">🛍 Shop</button>
  <div id="scoreDisplay">Score: 0 | High: 0</div>
  <div>🎁 Power‑Ups: <span id="powerCounts"></span></div>
  <div>🪙 Coins: <span id="coinDisplay">0</span></div>
</div>
<div id="settings">
  <h3>Settings</h3>
  <label><input type="checkbox" id="themeToggle"> Light Theme</label>
  <label>Player Color: <input type="color" id="colorPlayer" value="#1E90FF"></label>
  <label>Obstacle Color: <input type="color" id="colorObstacle" value="#DC143C"></label>
  <label><input type="checkbox" id="audioToggle" checked> Sound FX</label>
  <hr><h4>Keybindings</h4>
  <label>Jump: <input type="text" id="keyJump" value=" " maxlength="1"></label>
  <label>Duck: <input type="text" id="keyDuck" value="ArrowDown"></label>
  <label>Power: <input type="text" id="keyPower" value="p"></label>
  <label>Pause: <input type="text" id="keyPause" value=""></label>
  <label>Restart: <input type="text" id="keyRestart" value=""></label>
  <label>Settings: <input type="text" id="keySettings" value=""></label>
</div>
<div id="shopBox">
  <strong>🛍 Shop</strong>
  <p>25🪙 per power-up</p>
  <button class="btn" onclick="buyPower('shield')">Buy 🛡 Shield</button>
  <button class="btn" onclick="buyPower('speed')">Buy ⚡ Speed</button>
  <button class="btn" onclick="buyPower('double')">Buy ✌️ Double</button>
  <button class="btn" onclick="buyPower('doubleJump')">Buy 🚀 Double Jump</button>
  <button class="btn" onclick="buyPower('magnet')">Buy 🧲 Magnet</button>
</div>
<div id="overlay">
  <h1>Quiq - Runner</h1>
  <p>Click or Press Jump Key</p>
  <button class="btn" onclick="startGame()">▶ Start</button>
</div>
<script>
  const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
  const S = {
    themeToggle: document.getElementById('themeToggle'), colorPlayer: document.getElementById('colorPlayer'),
    colorObstacle: document.getElementById('colorObstacle'), audioToggle: document.getElementById('audioToggle'),
    keyJump: document.getElementById('keyJump'), keyDuck: document.getElementById('keyDuck'),
    keyPower: document.getElementById('keyPower'), keyPause: document.getElementById('keyPause'),
    keyRestart: document.getElementById('keyRestart'), keySettings: document.getElementById('keySettings')
  };
  let player, obstacles, frameCount, score, highScore, gameStarted = false, gamePaused = false, obstacleSpeed;
  let powerUps = {}, coinCount = 0, canDoubleJump = false, magnetActive = false;

  const getCookie = (name) => document.cookie.split('; ').reduce((r, v) => {
    const parts = v.split('='); return parts[0] === name ? decodeURIComponent(parts[1]) : r;
  }, null);
  const setCookie = (name, value) => {
    const expires = new Date(Date.now() + 100*365*24*60*60*1000).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
  };

  function loadData() {
    coinCount = parseInt(getCookie('coins')) || 0;
    highScore = parseInt(getCookie('highScore')) || 0;
    powerUps = JSON.parse(getCookie('powerUps') || '{}');
    ['shield','speed','double','doubleJump','magnet'].forEach(p=>powerUps[p]=powerUps[p]||0);
  }

  function saveData() {
    setCookie('coins', coinCount);
    setCookie('highScore', highScore);
    setCookie('powerUps', JSON.stringify(powerUps));
  }

  function updateCoinDisplay() {
    document.getElementById('coinDisplay').textContent = coinCount;
  }

  function updateScore() {
    document.getElementById('scoreDisplay').textContent = `Score: ${score} | High: ${highScore}`;
  }

  function updatePowerDisplay() {
    document.getElementById('powerCounts').textContent =
      `🛡${powerUps.shield} ⚡${powerUps.speed} ✌️${powerUps.double} 🚀${powerUps.doubleJump} 🧲${powerUps.magnet}`;
  }

  function buyPower(type) {
    if (coinCount < 25) return alert("Not enough coins!");
    coinCount -= 25;
    powerUps[type]++;
    updateCoinDisplay(); updatePowerDisplay(); saveData();
  }

  function toggleShop() {
    const box = document.getElementById('shopBox');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  }

  function toggleSettings() {
    const s = document.getElementById('settings');
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
  }

  function togglePause() { if (!gameStarted) return; gamePaused = !gamePaused; if (!gamePaused) gameLoop(); }
  function restartGame() { init(); document.getElementById('overlay').style.display = 'none'; gameLoop(); }
  function startGame() { gameStarted = true; document.getElementById('overlay').style.display = 'none'; gameLoop(); }

  window.addEventListener('keydown', e => {
    if (e.key === S.keyJump.value) jump();
    if (e.key === S.keyDuck.value) duck(true);
    if (e.key === S.keyPower.value) activatePower();
    if (e.key === S.keyPause.value) togglePause();
    if (e.key === S.keyRestart.value) restartGame();
    if (e.key === S.keySettings.value) toggleSettings();
  });
  window.addEventListener('keyup', e => { if (e.key === S.keyDuck.value) duck(false); });

  function init() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    player = {x:50,y:canvas.height-100,w:50,h:50,vy:0,gravity:0.6,jumping:false,ducking:false};
    obstacles=[];frameCount=0;score=0;
    loadData(); updatePowerDisplay(); updateCoinDisplay(); updateScore();
    obstacleSpeed = 8;
  }

  function jump() {
    if (!player.jumping) { player.vy = -15; player.jumping = true; canDoubleJump = true; }
    else if (canDoubleJump && powerUps.doubleJump > 0) {
      player.vy = -15; powerUps.doubleJump--; canDoubleJump = false; updatePowerDisplay(); saveData();
    }
  }

  function duck(on) { player.ducking = on; }

  function activatePower() {
    if (powerUps.shield) { powerUps.shield--; updatePowerDisplay(); saveData(); return; }
    if (powerUps.speed) { powerUps.speed--; obstacleSpeed += 3; updatePowerDisplay(); saveData(); return; }
    if (powerUps.double) { powerUps.double--; score *= 2; updatePowerDisplay(); saveData(); updateScore(); return; }
    if (powerUps.magnet) {
      powerUps.magnet--; magnetActive = true; setTimeout(()=>magnetActive=false,5000);
      updatePowerDisplay(); saveData();
    }
  }

  function gameLoop() {
    if (!gameStarted || gamePaused) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frameCount++;

    // game logic goes here... including collision, coin gain, etc

    requestAnimationFrame(gameLoop);
  }

  function gameOver() {
    gameStarted = false;
    document.getElementById('overlay').innerHTML = `
      <h1>Game Over</h1>
      <p>Score: ${score}</p>
      <button class="btn" onclick="restartGame()">🔁 Restart</button>`;
    document.getElementById('overlay').style.display = 'flex';
    saveData();
  }

  init();
</script>
</body>
</html>
