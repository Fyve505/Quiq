<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runner - Quiq</title>
  <link rel="stylesheet" href="resources/runner/style.css" />
</head>
<body>
  <div id="start-screen">
    <h1>Runner - Quiq</h1>
    <p>Controls:</p>
    <ul>
      <li>Jump: W / ↑</li>
      <li>Crouch: S / ↓</li>
    </ul>
    <button id="start-btn">Start Game</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="lost-screen">
    <h2>Game Over</h2>
    <p>Your Score: <span id="final-score"></span></p>
    <p>High Score: <span id="high-score"></span></p>
    <button id="restart-btn">Restart</button>
  </div>

  <audio id="sound-jump" src="resources/runner/sound/jump.mp3"></audio>
  <audio id="sound-pickup" src="resources/runner/sound/pickup.wav"></audio>
  <audio id="sound-gameover" src="resources/runner/sound/gameover.mp3"></audio>

  <script src="resources/runner/script.js"></script>
</body>
</html>
