<!DOCTYPE html>
<html>
<head>
  <title>Exit attempt</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script>
    function isInAppEnvironment() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      // Heuristics to detect WebView / embedded app environments

      // iOS WebView: no 'Safari' in UA but iPhone/iPad/iPod present
      const iOSWebView = /iPhone|iPad|iPod/.test(ua) && !/Safari/.test(ua);

      // Android WebView: contains 'wv' or 'Version/x.x' pattern
      const androidWebView = /\bwv\b/.test(ua) || /Android.*Version\/[\d.]+/.test(ua);

      // Electron or other desktop apps might have specific identifiers
      const isElectron = ua.indexOf('Electron') !== -1;

      return iOSWebView || androidWebView || isElectron;
    }

    function tryClose() {
      if (isInAppEnvironment()) {
        alert("Detected app environment. Closing window...");
        window.close();

        // For some apps, you may need to call native interfaces here
        // Example: if (typeof AppInterface !== 'undefined') AppInterface.closeApp();
      } else {
        alert("Running in a normal browser.");
      }
    }

    window.onload = tryClose;
  </script>
</head>
<body>
  <h1>Environment Check</h1>
  <p>If in an app environment, this will attempt to close the window.</p>
</body>
</html>
