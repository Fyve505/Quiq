<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiq</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #222;
            color: white;
            position: relative;
        }
        .buttons {
            display: flex;
            gap: 10px;
        }
        .buttons button, #admin-btn, #fullscreen-btn, .website-btn, #website-page {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background: #444;
            color: white;
            border-radius: 5px;
        }
        .buttons button:hover, #admin-btn:hover, #fullscreen-btn:hover, .website-btn:hover, #website-page:hover {
            background: #666;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .title img {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }
        #fullscreen-btn {
            position: absolute;
            right: 20px;
           }
        #admin-btn {
            position: absolute;
            right: 137px;
        }
        #websites-container {
            display: none;
            margin-top: 20px;
        }
        .website-btn {
            padding: 15px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin: 5px;
          }
        #website-page {
            padding: 15px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin: 5px;
        }
        #websites {
            background-color: black;
        }
        #useless {
            background-color: #404040;
        }
        #banana {
            background-color: #FFEA00;
            color: black;
        }
        #ice {
            background-color: #5A7BAE;
          }
        #website-page {
            background-color: white;
        }
        #iframe-container {
            margin-top: 20px;
            border: 5px solid red;
            width: 80%;
            height: 500px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #content {
            /* Content to be frozen */
        }
        .frozen {
            pointer-events: none;
            visibility: hidden; /* Make the content disappear visually when frozen */
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="buttons">
            <button onclick="reloadPage()">Reload</button>
            <button onclick="closeFrame()">Close Frame</button>
            <button onclick="exitPage()">Exit</button>
          <button onclick="alart('...')">|</button>
          <button onclick="window.open('https://mega.nz/file/7V5WjIrQ#z1nbKNSwi7DTzyAfyxlkqwiAcsTSVHHQz8sO5FKRlwY', '_blank');">App</button>
        </div>
        <div class="title">
            <img src="icon.png" alt="Quiq Icon"> Quiq
        </div>
        <button id="fullscreen-btn" onclick="toggleFullScreen()">Full Screen</button>
      <button id="admin-btn" onclick="window.location.href='other/admin.html';">Admin</button>
    </div>

    <button id="websites" class="website-btn" onclick="toggleWebsites()">Websites</button>
    <button id="minigames" class="website-btn" onclick="toggleMinigames()">Minigames</button>

    <div id="websites-container">
        <button id="useless" class="website-btn" onclick="loadIframe('https://use-less-stuff.mozellosite.com/home')">Use-less-stuff</button>
        <button id="banana" class="website-btn" onclick="loadIframe('https://banana-web-6.mozellosite.com')">Bannana-Web-6</button>
        <button id="ice" class="website-btn" onclick="loadIframe('https://ice-web.mozellosite.com')">Ice-Web</button>
     <button id="website-page" class="website-btn" onclick="window.open('other/websites.html');">Website-Page</button>
    </div>

<div id="minigames-container">
        <button id="useless" class="website-btn" onclick="loadIframe('minigame/xo.html')">XO</button>
        <button id="useless" class="website-btn" onclick="loadIframe('minigame/rps.html')">Rock-Paper-Sissors</button>
        <button id="useless" class="website-btn" onclick="loadIframe('minigame/wait.log')">Wait-1</button>
        <button id="useless" class="website-btn" onclick="loadIframe('minigame/wait.log')">Wait-2</button>
        <button id="useless" class="website-btn" onclick="loadIframe('minigame/wait.log')">Wait-3</button>
    </div>

    <div id="iframe-container">
        <iframe id="iframe" src="about:blank"></iframe>
    </div>

    <div id="content">
        <!-- Main content that will be frozen -->
    </div>

    <script>
        let isFrozen = false;  // Track if the page content is frozen
        let freezeTimeout;     // Variable to store freeze timeout

        function toggleWebsites() {
            let container = document.getElementById('websites-container');
            container.style.display = (container.style.display === 'block') ? 'none' : 'block';
        }

        document.addEventListener('click', function(event) {
            let websitesBtn = document.getElementById('websites');
            let container = document.getElementById('websites-container');

            if (!websitesBtn.contains(event.target) && !container.contains(event.target)) {
                container.style.display = 'none';
            }
        });

        function loadIframe(url) {
            let iframeContainer = document.getElementById('iframe-container');
            let iframe = document.getElementById('iframe');
            iframe.src = url;
            iframeContainer.style.display = "block";
        }

        function reloadPage() {
            location.reload();  // Reloads the page
        }

        function closeFrame() {
            let iframeContainer = document.getElementById('iframe-container');
            iframeContainer.style.display = "none";  // Hides the iframe
        }

        function exitPage() {
            window.location.href = "about:blank";  // Change the URL to about:blank
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>

<p id="result"></p>

<script>
function checkCaptcha() {
    const response = hcaptcha.getResponse();
    const resultElem = document.getElementById('result');

    if (!response) {
        alert('Please complete the hCaptcha first.');
        resultElem.textContent = '';
        return;
    }

    resultElem.textContent = '✅ hCaptcha completed!';
}
</script>
