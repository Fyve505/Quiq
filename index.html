<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiq UI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #1e1e1e;
      padding: 10px 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      background-color: #2a2a2a;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      transition: background-color 0.2s;
    }

    .icon-btn:hover {
      background-color: #444;
    }

    .icon-btn i {
      margin-right: 6px;
    }

    #iframe-container {
      margin: 20px;
      display: none;
      animation: fadeInFrame 0.5s ease;
    }

    #iframe-container.fade-in {
      animation: fadeInFrame 0.5s ease;
    }

    @keyframes fadeInFrame {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 10px;
    }

    #loading-spinner {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 6px solid #333;
      border-top: 6px solid #00bcd4;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.9s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .website-btn {
      margin: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      background-color: #2c2c2c;
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: background 0.2s;
    }

    .website-btn:hover {
      background-color: #444;
    }

    #minigames-container,
    #extra-container {
      display: none;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="buttons">
      <button class="icon-btn" onclick="reloadPage()"><i class="fas fa-rotate"></i>Reload</button>
      <button class="icon-btn" onclick="closeFrame()"><i class="fas fa-xmark"></i>Close Frame</button>
      <button class="icon-btn" onclick="window.close()"><i class="fas fa-door-closed"></i>Exit</button>
      <button class="icon-btn" onclick="toggleProPopup()"><i class="fas fa-bars"></i></button>
      <button class="icon-btn" onclick="window.open('https://mega.nz/file/BYImwLYS#...', '_blank')"><i class="fas fa-download"></i>App</button>
    </div>
    <h1 style="margin: 0;">Quiq</h1>
    <div class="buttons">
      <button id="fullscreen-btn" class="icon-btn" onclick="toggleFullScreen()"><i class="fas fa-expand"></i>Full Screen</button>
      <button id="admin-btn" class="icon-btn" onclick="window.location.href='other/admin.html';"><i class="fas fa-lock"></i>Admin</button>
    </div>
  </div>

  <div style="margin: 20px;">
    <button id="minigames" class="website-btn" onclick="toggleMinigames()"><i class="fas fa-gamepad"></i>Minigames</button>
    <button id="extra" class="website-btn" onclick="toggleExtra()"><i class="fas fa-star"></i>Extra</button>
  </div>

  <div id="minigames-container">
    <button class="website-btn" onclick="loadIframe('games/minecraft/index.html')"><i class="fas fa-cube"></i>Minecraft</button>
    <button class="website-btn" onclick="loadIframe('games/1v1lol/index.html')"><i class="fas fa-person-rifle"></i>1v1.lol</button>
    <button class="website-btn" onclick="loadIframe('games/slope/index.html')"><i class="fas fa-arrow-trend-up"></i>Slope</button>
  </div>

  <div id="extra-container">
    <button class="website-btn" onclick="loadIframe('other/search/')"><i class="fas fa-magnifying-glass"></i>Search</button>
    <button class="website-btn" onclick="loadIframe('other/ai')"><i class="fas fa-robot"></i>AI</button>
    <button class="website-btn" onclick="window.open('https://extra-quiq.netlify.app/', '_blank')"><i class="fas fa-up-right-from-square"></i>Quiq-Extra</button>
  </div>

  <div id="loading-spinner"><div class="spinner"></div></div>

  <div id="iframe-container">
    <iframe id="iframe" src=""></iframe>
  </div>

  <script>
    function reloadPage() {
      location.reload();
    }

    function closeFrame() {
      document.getElementById('iframe').src = "";
      document.getElementById('iframe-container').style.display = "none";
    }

    function toggleProPopup() {
      alert("Popup menu logic here.");
    }

    function toggleFullScreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    function loadIframe(url) {
      const iframeContainer = document.getElementById('iframe-container');
      const iframe = document.getElementById('iframe');
      const spinner = document.getElementById('loading-spinner');

      spinner.style.display = 'block';
      iframeContainer.style.display = 'none';
      iframe.src = url;

      iframe.onload = () => {
        spinner.style.display = 'none';
        iframeContainer.style.display = 'block';
        iframeContainer.classList.remove('fade-in');
        void iframeContainer.offsetWidth;
        iframeContainer.classList.add('fade-in');
      };
    }

    function toggleMinigames() {
      const container = document.getElementById('minigames-container');
      container.style.display = (container.style.display === 'block') ? 'none' : 'block';
    }

    function toggleExtra() {
      const container = document.getElementById('extra-container');
      container.style.display = (container.style.display === 'block') ? 'none' : 'block';
    }

    document.addEventListener('click', function(event) {
      const minigamesBtn = document.getElementById('minigames');
      const minigamesContainer = document.getElementById('minigames-container');
      const extraBtn = document.getElementById('extra');
      const extraContainer = document.getElementById('extra-container');

      if (!minigamesBtn.contains(event.target) && !minigamesContainer.contains(event.target)) {
        minigamesContainer.style.display = 'none';
      }
      if (!extraBtn.contains(event.target) && !extraContainer.contains(event.target)) {
        extraContainer.style.display = 'none';
      }
    });
  </script>

</body>
</html>

    const response = hcaptcha.getResponse();

<div id="content"></div>

<script>
  fetch('resources/main.txt')
    .then(response => response.text())
    .then(data => {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = data;

      const scripts = tempDiv.querySelectorAll('script');

      scripts.forEach(script => {
        const newScript = document.createElement('script');
        if (script.src) {
          newScript.src = script.src;
          document.body.appendChild(newScript); // or document.head
        }
      });
    })
    .catch(error => console.error('Error loading file:', error));
</script>
