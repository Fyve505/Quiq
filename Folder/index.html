<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google-adsense-account" content="ca-pub-4555358558825444">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4555358558825444"
     crossorigin="anonymous"></script>
<title>Futuristic Modern Blank</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
    margin: 0; padding: 0;
  }

  body, html {
    height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Orbitron', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #00fff7;
    overflow: hidden;
  }

  .container {
    width: 80vw;
    height: 80vh;
    border: 4px solid #00fff7;
    border-radius: 24px;
    box-shadow:
      0 0 15px #00fff7,
      0 0 30px #00fff7 inset;
    backdrop-filter: blur(8px);
    background: rgba(0, 255, 247, 0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    animation: pulseBorder 4s ease-in-out infinite alternate;
  }

  /* Futuristic glowing border pulse */
  @keyframes pulseBorder {
    0% {
      box-shadow:
        0 0 15px #00fff7,
        0 0 30px #00fff7 inset;
    }
    100% {
      box-shadow:
        0 0 30px #00fff7,
        0 0 50px #00fff7 inset;
    }
  }

  /* Subtle futuristic grid pattern behind */
  .container::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(0deg, rgba(0,255,247,0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,247,0.1) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- EMPTY SPACE -->
  </div>
</body>
</html>
